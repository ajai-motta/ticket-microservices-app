apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: ajaijosephe/payments
          env: 
           - name: NATS_CLIENT_ID
             valueFrom:
               fieldRef:
                 fieldPath: metadata.name
           - name: MONGO_URI
             value: 'mongodb://payments-mongo-srv:27017/payments'
           - name: NATS_URL
             value: 'http://nats-srv:4222'
           - name: NATS_CLUSTER_ID
             value: ticketing
           - name: JWT_KEY
             valueFrom:
               secretKeyRef:
                 name: jwt-secret
                 key: Jwt_key
           - name: RAZOR_KEY
             valueFrom:
               secretKeyRef:
                 name: razor-secret
                 key: RAZOR_KEY
           - name: RAZOR_KEY_PUBLIC
             value: 'rzp_test_SRv8aPJ4MeI1ox'
---
apiVersion: v1 
kind: Service
metadata:
  name: payments-srv
spec:
  selector: 
    app: payments
  ports:
    - name: payments
      protocol: TCP
      port: 3000
      targetPort: 3000
  
    