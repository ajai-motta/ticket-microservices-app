name: deploy-auth
on: 
    push:
        branches: 
          - main
jobs:
  build:

          runs-on: ubuntu-latest
          environment: Docker-secret
          steps:
            - uses: actions/checkout@v2 
            - run: echo "${{ secrets.ORIGINALDOCKERTOKENPASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            - run:  docker build -t ${{ secrets.DOCKER_USERNAME }}/auth .
            - run: docker push ${{ secrets.DOCKER_USERNAME }}/auth
