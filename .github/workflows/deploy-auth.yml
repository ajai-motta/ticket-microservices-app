name: deploy-auth
on: 
    push:
        branches: 
          - main
jobs:
  build:

          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v2 
            - run: echo "${{ secrets.ORIGINALDOCKERTOKENPASSWORD }}"
            - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.ORIGINALDOCKERTOKENPASSWORD }}
            - run:  docker build -t ${{ secrets.DOCKER_USERNAME }}/auth .
            - run: docker push ${{ secrets.DOCKER_USERNAME }}/auth
